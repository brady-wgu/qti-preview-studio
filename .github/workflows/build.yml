name: Build desktop apps

# Tests the core conversion pipeline on BOTH Windows and macOS, then (only if
# those pass) builds the desktop binaries on their native runners. Triggers:
#   * Push a tag like v1.0.1  -> tests + builds both platforms AND publishes the
#     installers/portables to a GitHub Release (a plain download link anyone
#     can use, no GitHub account required).
#   * "Run workflow" button (Actions tab) -> tests + builds both platforms and
#     leaves the binaries as downloadable workflow artifacts (requires being
#     signed in to GitHub to download).
#   * Every push / pull request -> runs the cross-platform tests.

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test pipeline (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Real cross-platform proof: runs the conversion pipeline on macOS's
      # case-sensitive filesystem, asserting images resolve at their exact path.
      - run: npm run test:pipeline

  build:
    needs: test # only build/publish if the cross-platform tests pass
    permissions:
      contents: write # needed to publish the GitHub Release on tag builds
    # Binaries are only needed for tag builds and manual runs, not every push.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        # --publish never: electron-builder auto-publishes when a tag is present,
        # which needs a token in this step and duplicates our explicit release
        # step below. We handle distribution ourselves, so disable self-publish.
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload build as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qti-preview-studio-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

      - name: Publish to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(release/*.exe release/*.dmg release/*.zip)
          # Create the release once (harmless if another matrix job already did).
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated build of QTI Preview Studio $GITHUB_REF_NAME (Windows + macOS)." \
            || true
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
