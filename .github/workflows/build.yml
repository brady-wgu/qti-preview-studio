name: Build desktop apps

# Builds the Windows and macOS binaries on their native runners, so you never
# have to build locally again. Two ways to trigger:
#   * Push a tag like v1.0.1  -> builds both platforms AND publishes the
#     installers/portables to a GitHub Release (a plain download link anyone
#     can use, no GitHub account required).
#   * "Run workflow" button (Actions tab) -> builds both platforms and leaves
#     the binaries as downloadable workflow artifacts (requires being signed in
#     to GitHub to download).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # needed to publish the GitHub Release on tag builds
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run ${{ matrix.script }}

      - name: Upload build as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qti-preview-studio-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

      - name: Publish to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(release/*.exe release/*.dmg release/*.zip)
          # Create the release once (harmless if another matrix job already did).
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated build of QTI Preview Studio $GITHUB_REF_NAME (Windows + macOS)." \
            || true
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
